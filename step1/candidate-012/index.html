<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Lootbox Slots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Fine-Tuned Fortune Engine</p>
        <h1>LLM Lootbox Slots</h1>
        <p class="subhead">
          Spin to win fake AI tokens, then burn them instantly on premium
          “reasoning” like a true startup.
        </p>
      </header>

      <section class="machine" aria-label="Slot machine">
        <div class="token-bar" role="status" aria-live="polite">
          <div>
            <p class="label">Token Wallet</p>
            <p id="tokenBalance" class="value">120</p>
          </div>
          <div>
            <p class="label">Spin Cost</p>
            <p class="value">12</p>
          </div>
          <div>
            <p class="label">Last Payout</p>
            <p id="lastPayout" class="value">0</p>
          </div>
        </div>

        <div class="reel-wrap">
          <div class="reel" id="reel0" aria-label="Reel one">🤖</div>
          <div class="reel" id="reel1" aria-label="Reel two">🪙</div>
          <div class="reel" id="reel2" aria-label="Reel three">🔥</div>
        </div>

        <div class="actions">
          <button id="spinBtn" class="spin-btn">Spin & Deploy</button>
          <button id="cashOutBtn" class="cash-btn">Cash Out Buzzwords</button>
          <button id="resetBtn" class="ghost-btn">Reset Wallet</button>
        </div>

        <p id="message" class="message" aria-live="polite">
          Your model is idle. Burn tokens responsibly.
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
